name: CI/CD — Build & Push to AWS ECR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: 847946222506.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Cache NuGet packages
      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # 5. Build & Push AuthService
      - name: Build and push AuthService
        uses: docker/build-push-action@v5
        with:
          context: ./services/AuthService
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/url-shortener/auth-service:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/url-shortener/auth-service:latest

      # 6. Build & Push UrlService
      - name: Build and push UrlService
        uses: docker/build-push-action@v5
        with:
          context: ./services/UrlService
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/url-shortener/url-service:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/url-shortener/url-service:latest

      # 7. Build & Push AnalyticsService
      - name: Build and push AnalyticsService
        uses: docker/build-push-action@v5
        with:
          context: ./services/AnalyticsService
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/url-shortener/analytics-service:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/url-shortener/analytics-service:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Update kubeconfig
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      # 4. Apply K8s manifests
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/postgres/
          kubectl apply -f k8s/redis/
          kubectl apply -f k8s/rabbitmq/
          kubectl apply -f k8s/auth-service/
          kubectl apply -f k8s/url-service/
          kubectl apply -f k8s/analytics-service/
          kubectl apply -f k8s/ingress.yaml

      # 5. Update images with new SHA
      - name: Update deployment images
        run: |
          kubectl set image deployment/auth-service \
            auth-service=847946222506.dkr.ecr.us-east-1.amazonaws.com/url-shortener/auth-service:${{ github.sha }} \
            -n url-shortener
          kubectl set image deployment/url-service \
            url-service=847946222506.dkr.ecr.us-east-1.amazonaws.com/url-shortener/url-service:${{ github.sha }} \
            -n url-shortener
          kubectl set image deployment/analytics-service \
            analytics-service=847946222506.dkr.ecr.us-east-1.amazonaws.com/url-shortener/analytics-service:${{ github.sha }} \
            -n url-shortener

      # 6. Verify deployment
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/auth-service -n url-shortener
          kubectl rollout status deployment/url-service -n url-shortener
          kubectl rollout status deployment/analytics-service -n url-shortener